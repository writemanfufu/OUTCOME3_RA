<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XML to HTML Viewer (XSLT) -- Outcome 3</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; padding: 0 20px; }
    .error { color: red; background: #ffe6e6; padding: 10px; border-left: 5px solid red; }
    #output { margin-top: 20px; }
  </style>
</head>
<body>
  <h2>XSLT Transformation Viewer -- Guided Learning Records</h2>
  <div id="output">Loading and transforming...</div>

  <script>
    (function() {
      var xmlURL = 'learning_records.xml';
      var xslURL = 'style.xsl';

      try {
        var request;
        if (window.XMLHttpRequest) {
          request = new XMLHttpRequest();
        } else {
          request = new ActiveXObject("Microsoft.XMLHTTP");
        }

       
        request.open("GET", xmlURL, false);
        request.send();
        var xmlDoc = request.responseXML;

        
        request.open("GET", xslURL, false);
        request.send();
        var xslDoc = request.responseXML;

        
        if (window.ActiveXObject) {
        
          var transformed = xmlDoc.transformNode(xslDoc);
          document.getElementById("output").innerHTML = transformed;
        } else {
       
          var processor = new XSLTProcessor();
          processor.importStylesheet(xslDoc);
          var fragment = processor.transformToFragment(xmlDoc, document);
          document.getElementById("output").innerHTML = '';
          document.getElementById("output").appendChild(fragment);
        }
      } catch (err) {
        document.getElementById("output").innerHTML = '<div class="error"><strong>Error:</strong> ' + err.message + '</div>';
      }
    })();
  </script>
</body>
</html>
